<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f4eadc">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="職場違和感メモ">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>職場違和感メモ</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon.png">
  <style>
    :root {
      --bg: #fbf7f0;
      --bg-soft: #f6eddf;
      --card: #fffdf9;
      --text: #2f2a25;
      --muted: #756d64;
      --line: #e8dccb;
      --accent: #8f6b4f;
      --accent-strong: #6f4f38;
      --accent-soft: #efe1d1;
      --danger: #9f4d43;
      --danger-soft: #f5ded9;
      --shadow: 0 10px 24px rgba(91, 70, 48, 0.08);
      --radius: 18px;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      overflow-x: hidden;
      background: var(--bg);
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(246, 237, 223, 0.95), rgba(251, 247, 240, 0.96) 260px),
        var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      font-size: 16px;
      line-height: 1.65;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    input,
    textarea,
    select {
      color: var(--text);
    }

    textarea {
      resize: vertical;
      min-height: 122px;
    }

    .app {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: calc(18px + var(--safe-top)) 16px calc(28px + var(--safe-bottom));
    }

    .top {
      padding: 8px 2px 16px;
      text-align: center;
    }

    .app-title {
      margin: 0;
      font-size: 30px;
      line-height: 1.2;
      letter-spacing: 0;
      font-weight: 800;
    }

    .lead {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .tabs {
      position: sticky;
      top: 0;
      z-index: 5;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 8px 0 14px;
      background: linear-gradient(180deg, var(--bg) 70%, rgba(251, 247, 240, 0));
    }

    .tab-button {
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--accent-strong);
      background: rgba(255, 253, 249, 0.9);
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(91, 70, 48, 0.05);
    }

    .tab-button.is-active {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }

    .screen {
      display: none;
    }

    .screen.is-active {
      display: block;
    }

    .card,
    .record-card,
    .detail-card {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .card {
      padding: 18px;
    }

    .form-grid {
      display: grid;
      gap: 16px;
    }

    .date-time-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 12px;
    }

    .field {
      min-width: 0;
    }

    .field label,
    .group-label {
      display: block;
      margin-bottom: 7px;
      color: var(--text);
      font-size: 15px;
      font-weight: 800;
    }

    .help {
      margin: -2px 0 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .text-input,
    .textarea-input,
    .select-input,
    .date-input,
    .time-input {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(91, 70, 48, 0.03);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .text-input,
    .textarea-input,
    .select-input {
      display: block;
      padding: 13px 14px;
      font-size: 16px;
    }

    .text-input,
    .select-input {
      min-height: 48px;
    }

    .textarea-input::placeholder,
    .text-input::placeholder {
      color: #9b9288;
    }

    .text-input:focus,
    .textarea-input:focus,
    .select-input:focus,
    .date-input:focus,
    .time-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(143, 107, 79, 0.14);
    }

    .input-wrap {
      width: 100%;
      max-width: 100%;
      min-width: 0;
    }

    input[type="date"],
    input[type="time"],
    .date-input,
    .time-input {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      box-sizing: border-box;
      display: block;
      height: 50px;
      min-height: 50px;
      padding: 0 14px;
      border-radius: 14px;
      text-align: left;
      font-size: 16px;
      line-height: 50px;
    }

    input[type="date"]::-webkit-date-and-time-value,
    input[type="time"]::-webkit-date-and-time-value {
      text-align: left;
    }

    .select-input {
      -webkit-appearance: none;
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--accent-strong) 50%),
        linear-gradient(135deg, var(--accent-strong) 50%, transparent 50%);
      background-position:
        calc(100% - 20px) 21px,
        calc(100% - 14px) 21px;
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
      padding-right: 36px;
    }

    .check-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
    }

    .check-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      padding: 9px 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
    }

    .check-pill input {
      width: 18px;
      height: 18px;
      margin: 0;
      accent-color: var(--accent);
      flex: 0 0 auto;
    }

    .other-field {
      display: none;
      margin-top: 10px;
    }

    .other-field.is-visible {
      display: block;
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 50px;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 800;
      text-align: center;
    }

    .button-primary {
      color: #fff;
      background: var(--accent);
      box-shadow: 0 10px 18px rgba(111, 79, 56, 0.18);
    }

    .button-primary:active {
      background: var(--accent-strong);
    }

    .button-secondary {
      color: var(--accent-strong);
      background: var(--accent-soft);
    }

    .button-plain {
      color: var(--accent-strong);
      background: #fff;
      border: 1px solid var(--line);
    }

    .button-danger {
      color: var(--danger);
      background: var(--danger-soft);
    }

    .message {
      display: none;
      margin: 14px 0 0;
      padding: 12px 14px;
      border-radius: 14px;
      color: var(--accent-strong);
      background: #f2e6d7;
      font-weight: 700;
    }

    .message.is-visible {
      display: block;
    }

    .list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 4px 2px 12px;
    }

    .section-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.3;
    }

    .count {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .record-list {
      display: grid;
      gap: 12px;
    }

    .list-description {
      margin: -4px 2px 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .record-card {
      display: block;
      padding: 15px;
      color: inherit;
      text-align: left;
    }

    .record-card:active {
      transform: translateY(1px);
    }

    .record-meta {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .record-person {
      margin: 5px 0 3px;
      font-size: 17px;
      font-weight: 800;
    }

    .record-event {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      max-width: 100%;
      padding: 4px 9px;
      border-radius: 999px;
      color: var(--accent-strong);
      background: var(--accent-soft);
      font-size: 12px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .empty {
      padding: 28px 16px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      background: rgba(255, 253, 249, 0.72);
      text-align: center;
      font-weight: 700;
    }

    .backup-card {
      width: 100%;
      margin-bottom: 14px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .backup-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
    }

    .backup-text {
      margin: 8px 0 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .backup-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .detail-card {
      padding: 18px;
    }

    .detail-title {
      margin: 0 0 14px;
      font-size: 20px;
      line-height: 1.35;
    }

    .detail-grid {
      display: grid;
      gap: 13px;
    }

    .detail-item {
      min-width: 0;
      padding-bottom: 13px;
      border-bottom: 1px solid var(--line);
    }

    .detail-item:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .detail-label {
      margin: 0 0 4px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .detail-value {
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .detail-empty {
      color: #9b9288;
    }

    .detail-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .detail-actions .button-wide {
      grid-column: 1 / -1;
    }

    @media (max-width: 520px) {
      .app {
        padding-left: 14px;
        padding-right: 14px;
      }

      .app-title {
        font-size: 28px;
      }

      .date-time-row {
        grid-template-columns: minmax(0, 1fr);
      }

      .check-grid {
        grid-template-columns: minmax(0, 1fr);
      }

      .card,
      .detail-card {
        padding: 16px;
      }

      .backup-actions {
        grid-template-columns: minmax(0, 1fr);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <h1 class="app-title">職場違和感メモ</h1>
      <p class="lead">その場では大したことないと思った出来事も、あとから苦しくなることもあります。そんなときに見返せるように残しておくためのメモです。</p>
    </header>

    <nav class="tabs" aria-label="画面切り替え">
      <button class="tab-button is-active" type="button" id="showFormButton">記録する</button>
      <button class="tab-button" type="button" id="showListButton">一覧を見る</button>
    </nav>

    <section class="screen is-active" id="formScreen" aria-labelledby="formTitle">
      <div class="card">
        <h2 class="section-title" id="formTitle">記録フォーム</h2>
        <form id="memoForm" class="form-grid">
          <input type="hidden" id="recordId">

          <div class="date-time-row">
            <div class="field">
              <label for="date">日付</label>
              <div class="input-wrap">
                <input class="date-input" type="date" id="date" name="date">
              </div>
            </div>
            <div class="field">
              <label for="time">時間</label>
              <div class="input-wrap">
                <input class="time-input" type="time" id="time" name="time">
              </div>
            </div>
          </div>

          <div class="field">
            <label for="person">相手</label>
            <input class="text-input" type="text" id="person" name="person" placeholder="例：上司、先輩、同僚、取引先 など" autocomplete="off">
          </div>

          <div class="field">
            <label for="event">何があった？</label>
            <textarea class="textarea-input" id="event" name="event" placeholder="例：
・○○と言われた
・強い言い方をされた
・人格を否定するようなことを言われた
・無視された
・体調不良を責められた
・人前で叱責された
・必要以上に責められた"></textarea>
          </div>

          <div class="field">
            <label for="situation">場所・状況</label>
            <textarea class="textarea-input" id="situation" name="situation" placeholder="例：
・職場で
・会議中に
・休憩中に
・チャットやLINEで
・ミスを報告した後
・忙しい時間帯に
・他の人がいる前で"></textarea>
          </div>

          <div class="field">
            <label for="witnesses">周囲に誰かいた？</label>
            <select class="select-input" id="witnesses" name="witnesses">
              <option value="">未選択</option>
              <option value="いなかった">いなかった</option>
              <option value="1人いた">1人いた</option>
              <option value="複数人いた">複数人いた</option>
              <option value="お客さん・利用者さんがいた">お客さん・利用者さんがいた</option>
              <option value="覚えていない">覚えていない</option>
              <option value="その他">その他</option>
            </select>
          </div>

          <div class="field">
            <label for="witnessDetail">誰がいた？（任意）</label>
            <input class="text-input" type="text" id="witnessDetail" name="witnessDetail" placeholder="例：○○さん、女性社員など" autocomplete="off">
          </div>

          <fieldset class="field">
            <legend class="group-label">その時やその後の状態</legend>
            <p class="help">その場では平気でも、帰宅後や数日後につらくなることがあります。</p>
            <div class="check-grid" id="statesGroup"></div>
            <div class="other-field" id="stateOtherField">
              <label for="stateOther">その他の状態（任意）</label>
              <input class="text-input" type="text" id="stateOther" name="stateOther" placeholder="例：死にたい、出勤できないなど" autocomplete="off">
            </div>
          </fieldset>

          <fieldset class="field">
            <legend class="group-label">記録・証拠</legend>
            <div class="check-grid" id="evidencesGroup"></div>
            <div class="other-field" id="evidenceOtherField">
              <label for="evidenceOther">その他の記録・証拠（任意）</label>
              <input class="text-input" type="text" id="evidenceOther" name="evidenceOther" placeholder="例：通話記録、病院の記録など" autocomplete="off">
            </div>
          </fieldset>

          <div class="field">
            <label for="memo">メモ</label>
            <textarea class="textarea-input" id="memo" name="memo" placeholder="あとで思い出せるように、短くても大丈夫です。"></textarea>
          </div>

          <div class="actions">
            <button class="button button-primary" type="submit" id="saveButton">記録する</button>
            <button class="button button-plain" type="button" id="cancelEditButton" hidden>編集をやめる</button>
          </div>
          <p class="message" id="message" role="status" aria-live="polite"></p>
        </form>
      </div>
    </section>

    <section class="screen" id="listScreen" aria-labelledby="listTitle">
      <div class="list-head">
        <h2 class="section-title" id="listTitle">記録一覧</h2>
        <span class="count" id="recordCount"></span>
      </div>
      <p class="list-description">カードをタップすると詳細を見ることができ、編集や削除もできます。</p>
      <div class="backup-card" aria-labelledby="backupTitle">
        <h3 class="backup-title" id="backupTitle">バックアップ</h3>
        <p class="backup-text">記録を保存したり復元できます。
大切な記録がなくならないように、定期的に保存をお願いします。</p>
        <div class="backup-actions">
          <button class="button button-secondary" type="button" id="exportBackupButton">バックアップを保存</button>
          <label class="button button-plain" for="backupFileInput" id="importBackupButton" role="button" tabindex="0">バックアップを復元</label>
        </div>
        <p class="message" id="backupMessage" role="status" aria-live="polite"></p>
        <input class="visually-hidden" type="file" id="backupFileInput" accept=".json,application/json">
      </div>
      <div class="record-list" id="recordList"></div>
    </section>

    <section class="screen" id="detailScreen" aria-labelledby="detailTitle">
      <article class="detail-card" id="detailCard"></article>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "iwakan_memo_records";

    const statesOptions = [
      "動悸",
      "涙が出た",
      "不安",
      "怖かった",
      "眠れない",
      "食欲低下",
      "イライラ",
      "出勤前につらい",
      "数日後につらくなった",
      "何も感じなかった",
      "その他"
    ];

    const evidenceOptions = [
      "なし",
      "LINE",
      "メール",
      "録音",
      "スクショ",
      "メモ",
      "日記",
      "勤務表・シフト",
      "その他"
    ];

    const screens = {
      form: document.getElementById("formScreen"),
      list: document.getElementById("listScreen"),
      detail: document.getElementById("detailScreen")
    };

    const showFormButton = document.getElementById("showFormButton");
    const showListButton = document.getElementById("showListButton");
    const memoForm = document.getElementById("memoForm");
    const recordIdInput = document.getElementById("recordId");
    const dateInput = document.getElementById("date");
    const timeInput = document.getElementById("time");
    const personInput = document.getElementById("person");
    const eventInput = document.getElementById("event");
    const situationInput = document.getElementById("situation");
    const witnessesInput = document.getElementById("witnesses");
    const witnessDetailInput = document.getElementById("witnessDetail");
    const memoInput = document.getElementById("memo");
    const statesGroup = document.getElementById("statesGroup");
    const stateOtherField = document.getElementById("stateOtherField");
    const stateOtherInput = document.getElementById("stateOther");
    const evidencesGroup = document.getElementById("evidencesGroup");
    const evidenceOtherField = document.getElementById("evidenceOtherField");
    const evidenceOtherInput = document.getElementById("evidenceOther");
    const saveButton = document.getElementById("saveButton");
    const cancelEditButton = document.getElementById("cancelEditButton");
    const message = document.getElementById("message");
    const recordList = document.getElementById("recordList");
    const recordCount = document.getElementById("recordCount");
    const detailCard = document.getElementById("detailCard");
    const exportBackupButton = document.getElementById("exportBackupButton");
    const importBackupButton = document.getElementById("importBackupButton");
    const backupFileInput = document.getElementById("backupFileInput");
    const backupMessage = document.getElementById("backupMessage");

    function padNumber(value) {
      return String(value).padStart(2, "0");
    }

    function getNowValues() {
      const now = new Date();
      return {
        date: now.getFullYear() + "-" + padNumber(now.getMonth() + 1) + "-" + padNumber(now.getDate()),
        time: padNumber(now.getHours()) + ":" + padNumber(now.getMinutes())
      };
    }

    function createId() {
      if (window.crypto && crypto.randomUUID) {
        return crypto.randomUUID();
      }
      return "record-" + Date.now() + "-" + Math.random().toString(36).slice(2);
    }

    function normalizeRecord(record) {
      return {
        id: record.id || createId(),
        date: record.date || "",
        time: record.time || "",
        person: record.person || "",
        event: record.event || "",
        situation: record.situation || "",
        witnesses: record.witnesses || "",
        witnessDetail: record.witnessDetail || "",
        states: Array.isArray(record.states) ? record.states : [],
        stateOther: record.stateOther || "",
        evidences: Array.isArray(record.evidences) ? record.evidences : [],
        evidenceOther: record.evidenceOther || "",
        memo: record.memo || "",
        createdAt: record.createdAt || "",
        updatedAt: record.updatedAt || ""
      };
    }

    function loadRecords() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed.map(normalizeRecord) : [];
      } catch (error) {
        return [];
      }
    }

    function saveRecords(records) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function truncate(value, length) {
      const text = String(value || "").trim();
      if (!text) {
        return "内容は未入力です";
      }
      return text.length > length ? text.slice(0, length) + "..." : text;
    }

    function formatDateTime(date, time) {
      const dateText = date || "日付未入力";
      const timeText = time || "時間未入力";
      return dateText + " " + timeText;
    }

    function formatIsoDateTime(value) {
      if (!value) {
        return "不明";
      }

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return "不明";
      }

      const parts = new Intl.DateTimeFormat("ja-JP", {
        timeZone: "Asia/Tokyo",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).formatToParts(date).reduce((acc, part) => {
        acc[part.type] = part.value;
        return acc;
      }, {});

      return parts.year + "/" + parts.month + "/" + parts.day + " " + parts.hour + ":" + parts.minute;
    }

    function buildCheckboxes(container, name, options) {
      container.innerHTML = options.map((option, index) => {
        const id = name + "-" + index;
        return `
          <label class="check-pill" for="${id}">
            <input type="checkbox" id="${id}" name="${name}" value="${escapeHtml(option)}">
            <span>${escapeHtml(option)}</span>
          </label>
        `;
      }).join("");
    }

    function getCheckedValues(name) {
      return Array.from(document.querySelectorAll('input[name="' + name + '"]:checked')).map(input => input.value);
    }

    function setCheckedValues(name, values) {
      const selected = new Set(values || []);
      document.querySelectorAll('input[name="' + name + '"]').forEach(input => {
        input.checked = selected.has(input.value);
      });
    }

    function hasOtherChecked(name) {
      return Array.from(document.querySelectorAll('input[name="' + name + '"]:checked')).some(input => input.value === "その他");
    }

    function toggleOtherFields() {
      const stateOtherVisible = hasOtherChecked("states");
      const evidenceOtherVisible = hasOtherChecked("evidences");

      stateOtherField.classList.toggle("is-visible", stateOtherVisible);
      evidenceOtherField.classList.toggle("is-visible", evidenceOtherVisible);

      if (!stateOtherVisible) {
        stateOtherInput.value = "";
      }
      if (!evidenceOtherVisible) {
        evidenceOtherInput.value = "";
      }
    }

    function showMessage(text) {
      message.textContent = text;
      message.classList.add("is-visible");
      window.setTimeout(() => {
        message.classList.remove("is-visible");
      }, 3600);
    }

    function setInitialDateTime() {
      const now = getNowValues();
      dateInput.value = now.date;
      timeInput.value = now.time;
    }

    function showBackupStatus(text) {
      switchScreen("list");
      backupMessage.textContent = text;
      backupMessage.classList.add("is-visible");
      window.setTimeout(() => {
        backupMessage.classList.remove("is-visible");
      }, 4200);
    }

    function exportBackup() {
      const today = getNowValues().date;
      const backup = {
        app: "職場違和感メモ",
        version: 1,
        exportedAt: new Date().toISOString(),
        records: loadRecords()
      };
      const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "iwakan-memo-backup-" + today + ".json";
      document.body.appendChild(link);
      link.click();
      link.remove();
      window.setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function importBackupFile(file) {
      if (!file) {
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(String(reader.result || ""));
          if (!parsed || !Array.isArray(parsed.records)) {
            throw new Error("Invalid backup format");
          }
          if (!parsed.records.every(record => record && record.id)) {
            throw new Error("Invalid record");
          }

          const nextRecords = parsed.records.map(normalizeRecord);
          const confirmed = window.confirm("このバックアップから復元しますか？現在の記録は上書きされます。");
          if (!confirmed) {
            return;
          }

          saveRecords(nextRecords);
          renderList();
          resetForm();
          showBackupStatus("バックアップを復元しました。");
        } catch (error) {
          showBackupStatus("バックアップを復元できませんでした。");
        } finally {
          backupFileInput.value = "";
        }
      };
      reader.onerror = () => {
        backupFileInput.value = "";
        showBackupStatus("バックアップを復元できませんでした。");
      };
      reader.readAsText(file);
    }

    function resetForm(options = {}) {
      const keepMessage = Boolean(options.keepMessage);
      memoForm.reset();
      recordIdInput.value = "";
      saveButton.textContent = "記録する";
      cancelEditButton.hidden = true;
      setInitialDateTime();
      toggleOtherFields();
      if (!keepMessage) {
        message.classList.remove("is-visible");
      }
    }

    function switchScreen(screenName) {
      Object.values(screens).forEach(screen => screen.classList.remove("is-active"));
      screens[screenName].classList.add("is-active");
      showFormButton.classList.toggle("is-active", screenName === "form");
      showListButton.classList.toggle("is-active", screenName === "list");
      if (screenName === "list") {
        renderList();
      }
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function getSortedRecords() {
      return loadRecords().sort((a, b) => {
        const aKey = (a.date || "") + "T" + (a.time || "00:00") + "|" + (a.createdAt || "");
        const bKey = (b.date || "") + "T" + (b.time || "00:00") + "|" + (b.createdAt || "");
        return bKey.localeCompare(aKey);
      });
    }

    function renderTags(values) {
      if (!values || values.length === 0) {
        return "";
      }
      return `<div class="tags">${values.map(value => `<span class="tag">${escapeHtml(value)}</span>`).join("")}</div>`;
    }

    function renderList() {
      const records = getSortedRecords();
      recordCount.textContent = records.length + "件";

      if (records.length === 0) {
        recordList.innerHTML = '<p class="empty">まだ記録はありません</p>';
        return;
      }

      recordList.innerHTML = records.map(record => `
        <button class="record-card" type="button" data-id="${escapeHtml(record.id)}">
          <div class="record-meta">${escapeHtml(formatDateTime(record.date, record.time))}</div>
          <div class="record-person">${escapeHtml(record.person || "相手は未入力")}</div>
          <p class="record-event">${escapeHtml(truncate(record.event, 72))}</p>
          ${renderTags(record.states)}
        </button>
      `).join("");
    }

    function detailValue(value) {
      const text = Array.isArray(value) ? value.join("、") : value;
      if (!text) {
        return '<p class="detail-value detail-empty">未入力</p>';
      }
      return `<p class="detail-value">${escapeHtml(text)}</p>`;
    }

    function renderDetail(id) {
      const record = loadRecords().find(item => item.id === id);
      if (!record) {
        switchScreen("list");
        return;
      }

      detailCard.innerHTML = `
        <h2 class="detail-title" id="detailTitle">${escapeHtml(formatDateTime(record.date, record.time))}</h2>
        <div class="detail-grid">
          <div class="detail-item">
            <p class="detail-label">相手</p>
            ${detailValue(record.person)}
          </div>
          <div class="detail-item">
            <p class="detail-label">何があった？</p>
            ${detailValue(record.event)}
          </div>
          <div class="detail-item">
            <p class="detail-label">場所・状況</p>
            ${detailValue(record.situation)}
          </div>
          <div class="detail-item">
            <p class="detail-label">周囲に誰かいた？</p>
            ${detailValue(record.witnesses)}
            ${record.witnessDetail ? `<p class="detail-value">誰がいた？：${escapeHtml(record.witnessDetail)}</p>` : ""}
          </div>
          <div class="detail-item">
            <p class="detail-label">その時やその後の状態</p>
            ${detailValue(record.states)}
            ${record.stateOther ? `<p class="detail-value">その他の状態：${escapeHtml(record.stateOther)}</p>` : ""}
          </div>
          <div class="detail-item">
            <p class="detail-label">記録・証拠</p>
            ${detailValue(record.evidences)}
            ${record.evidenceOther ? `<p class="detail-value">その他の記録・証拠：${escapeHtml(record.evidenceOther)}</p>` : ""}
          </div>
          <div class="detail-item">
            <p class="detail-label">メモ</p>
            ${detailValue(record.memo)}
          </div>
          <div class="detail-item">
            <p class="detail-label">作成・更新</p>
            ${detailValue("作成：" + formatIsoDateTime(record.createdAt) + "\n更新：" + formatIsoDateTime(record.updatedAt))}
          </div>
        </div>
        <div class="detail-actions">
          <button class="button button-secondary" type="button" data-action="edit" data-id="${escapeHtml(record.id)}">編集</button>
          <button class="button button-danger" type="button" data-action="delete" data-id="${escapeHtml(record.id)}">削除</button>
          <button class="button button-plain button-wide" type="button" data-action="back">一覧に戻る</button>
        </div>
      `;
      switchScreen("detail");
    }

    function fillForm(record) {
      recordIdInput.value = record.id;
      dateInput.value = record.date || "";
      timeInput.value = record.time || "";
      personInput.value = record.person || "";
      eventInput.value = record.event || "";
      situationInput.value = record.situation || "";
      witnessesInput.value = record.witnesses || "";
      witnessDetailInput.value = record.witnessDetail || "";
      setCheckedValues("states", record.states || []);
      stateOtherInput.value = record.stateOther || "";
      setCheckedValues("evidences", record.evidences || []);
      evidenceOtherInput.value = record.evidenceOther || "";
      toggleOtherFields();
      memoInput.value = record.memo || "";
      saveButton.textContent = "更新する";
      cancelEditButton.hidden = false;
      switchScreen("form");
    }

    function deleteRecord(id) {
      if (!window.confirm("この記録を削除しますか？")) {
        return;
      }
      const records = loadRecords().filter(record => record.id !== id);
      saveRecords(records);
      renderList();
      switchScreen("list");
    }

    memoForm.addEventListener("submit", event => {
      event.preventDefault();
      const records = loadRecords();
      const editingId = recordIdInput.value;
      const nowIso = new Date().toISOString();

      const formRecord = {
        id: editingId || createId(),
        date: dateInput.value,
        time: timeInput.value,
        person: personInput.value.trim(),
        event: eventInput.value.trim(),
        situation: situationInput.value.trim(),
        witnesses: witnessesInput.value,
        witnessDetail: witnessDetailInput.value.trim(),
        states: getCheckedValues("states"),
        stateOther: hasOtherChecked("states") ? stateOtherInput.value.trim() : "",
        evidences: getCheckedValues("evidences"),
        evidenceOther: hasOtherChecked("evidences") ? evidenceOtherInput.value.trim() : "",
        memo: memoInput.value.trim(),
        createdAt: nowIso,
        updatedAt: nowIso
      };

      if (editingId) {
        const index = records.findIndex(record => record.id === editingId);
        if (index !== -1) {
          formRecord.createdAt = records[index].createdAt || nowIso;
          records[index] = formRecord;
        } else {
          records.push(formRecord);
        }
        saveRecords(records);
        showMessage("更新できました。");
        renderList();
      } else {
        records.push(formRecord);
        saveRecords(records);
        showMessage("記録しました。");
      }

      resetForm({ keepMessage: true });
    });

    showFormButton.addEventListener("click", () => {
      if (!recordIdInput.value) {
        resetForm();
      }
      switchScreen("form");
    });

    showListButton.addEventListener("click", () => {
      switchScreen("list");
    });

    cancelEditButton.addEventListener("click", () => {
      resetForm();
    });

    statesGroup.addEventListener("change", toggleOtherFields);

    evidencesGroup.addEventListener("change", toggleOtherFields);

    exportBackupButton.addEventListener("click", exportBackup);

    importBackupButton.addEventListener("keydown", event => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        backupFileInput.click();
      }
    });

    backupFileInput.addEventListener("change", event => {
      importBackupFile(event.target.files && event.target.files[0]);
    });

    recordList.addEventListener("click", event => {
      const card = event.target.closest(".record-card");
      if (card) {
        renderDetail(card.dataset.id);
      }
    });

    detailCard.addEventListener("click", event => {
      const button = event.target.closest("button[data-action]");
      if (!button) {
        return;
      }

      const action = button.dataset.action;
      const id = button.dataset.id;

      if (action === "back") {
        switchScreen("list");
      }
      if (action === "edit") {
        const record = loadRecords().find(item => item.id === id);
        if (record) {
          fillForm(record);
        }
      }
      if (action === "delete") {
        deleteRecord(id);
      }
    });

    window.addEventListener("DOMContentLoaded", () => {
      buildCheckboxes(statesGroup, "states", statesOptions);
      buildCheckboxes(evidencesGroup, "evidences", evidenceOptions);
      setInitialDateTime();
      toggleOtherFields();
      renderList();

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      }
    });
  </script>
</body>
</html>
